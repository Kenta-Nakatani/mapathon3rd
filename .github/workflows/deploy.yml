name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate config.js from Secrets
        run: |
          cat > config.js << 'EOF'
          // Mapbox Access Token - auto-generated from GitHub Secrets
          const MAPBOX_ACCESS_TOKEN = '${{ secrets.MAPBOX_ACCESS_TOKEN }}';
          
          if (typeof module !== 'undefined' && module.exports) {
              module.exports = { MAPBOX_ACCESS_TOKEN };
          } else {
              window.MAPBOX_ACCESS_TOKEN = MAPBOX_ACCESS_TOKEN;
          }
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
